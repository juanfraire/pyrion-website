<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyrion</title>
  <meta name="description" content="Pyrion — coming soon.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f1a;
      color: #e8ebf2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
    }

    main { padding: 2rem; }

    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffb347, #ff6b35 55%, #c0392b);
      box-shadow: 0 0 60px rgba(255, 107, 53, 0.35);
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    p {
      color: #8a93a8;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <h1>Pyrion</h1>
    <p>Coming soon.</p>
  </main>
</body>
</html>
