<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Pyrion — og card render (1200x630, headless chrome)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Manrope:wght@700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#050810; }
  #og-card {
    width:1200px; height:630px; position:relative; overflow:hidden;
    background:#050810; color:#E6EDF7;
    display:flex; flex-direction:column; justify-content:center;
    padding:0 96px; font-family:Inter,sans-serif;
  }
  #og-card .glow { position:absolute; width:900px; height:900px; right:-260px; top:-300px;
    background:radial-gradient(circle, rgba(79,139,255,0.22), transparent 62%); }
  #og-card svg.gridlines { position:absolute; inset:0; width:100%; height:100%; opacity:0.5; }
  #og-card .brand { display:flex; align-items:center; gap:22px; margin-bottom:42px; }
  #og-card .brand svg { width:72px; height:72px; }
  #og-card .brand span { font:800 2.35rem 'Manrope'; letter-spacing:0.14em; }
  #og-card h1 { font:700 4.3rem/1.08 'Space Grotesk'; letter-spacing:-0.02em; max-width:13em; position:relative; }
  #og-card h1 .grad { background:linear-gradient(95deg,#4F8BFF,#5BD4FF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  #og-card .tag { margin-top:34px; font:500 1.5rem Inter; color:#A0AABF; position:relative; max-width:30em; }
  #og-card .domain { position:absolute; bottom:44px; left:96px; font:500 1.15rem 'JetBrains Mono'; color:#5BD4FF; letter-spacing:0.12em; }
  #og-card .chips { position:absolute; right:96px; bottom:44px; display:flex; gap:14px; }
  #og-card .chip { border:1px solid #1E2A44; background:rgba(15,21,36,0.8); border-radius:999px; padding:10px 22px; font:500 1.05rem 'JetBrains Mono'; color:#A0AABF; letter-spacing:0.06em; }
  #og-card .chip-fee { border-color:#4F8BFF; color:#5BD4FF; background:rgba(79,139,255,0.12); }
</style>
</head>
<body>
<div id="og-card">
  <svg class="gridlines" viewBox="0 0 1200 630" preserveAspectRatio="none">
    <g stroke="#1E2A44" stroke-width="1">
      <path d="M0 480 L300 430 L640 470 L980 410 L1200 440" fill="none"/>
      <path d="M0 540 L260 560 L600 520 L940 555 L1200 525" fill="none"/>
      <path d="M820 0 L860 140 L1020 220 L1100 380"/>
      <path d="M950 60 L1020 220" />
    </g>
    <g fill="#4F8BFF" opacity="0.9">
      <circle cx="860" cy="140" r="3.5"/><circle cx="1020" cy="220" r="4.5"/>
      <circle cx="1100" cy="380" r="3"/><circle cx="950" cy="60" r="2.5"/>
    </g>
  </svg>
  <div class="glow"></div>
  <div class="brand">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="oga" x1="6" y1="3" x2="14" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5FD2FF"/><stop offset="1" stop-color="#2E9BF0"/></linearGradient>
        <linearGradient id="ogb" x1="18" y1="7" x2="24" y2="30" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#3CABF6"/><stop offset="1" stop-color="#0E73D8"/></linearGradient>
        <mask id="ogcut"><rect width="32" height="32" fill="white"/><path d="M22.2 6 L13.5 13.5 L18.5 16.5 L7.6 24.8" fill="none" stroke="black" stroke-width="3.4" stroke-linejoin="miter" stroke-linecap="butt"/></mask>
      </defs>
      <g mask="url(#ogcut)">
        <path fill="url(#oga)" d="M22.2 6 L13.5 13.5 L18.5 16.5 L7.6 24.8 L4 22.75 L4 9.25 L16 2.5 Z"/>
        <path fill="url(#ogb)" d="M22.2 6 L13.5 13.5 L18.5 16.5 L7.6 24.8 L16 29.5 L28 22.75 L28 9.25 Z"/>
      </g>
    </svg>
    <span>PYRION</span>
  </div>
  <h1>La energía de su empresa,<br /><span class="grad">optimizada</span> con lógica de portfolio.</h1>
  <p class="tag">Optimizamos sus contratos del MEM y reinvertimos el ahorro en eficiencia energética y energía solar.</p>
  <div class="domain">www.pyrion.com.ar</div>
  <div class="chips">
    <div class="chip">Contratos · Eficiencia · Solar</div>
    <div class="chip chip-fee">Si no ahorra, no paga</div>
  </div>
</div>
</body>
</html>
