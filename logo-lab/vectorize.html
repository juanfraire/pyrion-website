<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pyrion — vectorize proposal</title>
<style>
  body { margin:0; background:#1a1d24; color:#ddd; font-family:system-ui,sans-serif; padding:24px; }
  h1 { font-size:1rem; font-weight:600; margin:0 0 16px; }
  .row { display:flex; gap:26px; align-items:flex-start; flex-wrap:wrap; }
  .panel { background:#0F1524; border:1px solid #1E2A44; border-radius:14px; padding:18px; }
  .panel h2 { font-size:.72rem; color:#6A7488; margin:0 0 12px; font-weight:600; letter-spacing:.05em; }
  .stack { display:flex; align-items:center; gap:18px; }
  .lightbox { background:#fff; padding:14px; border-radius:10px; display:inline-flex; }
  img.ref { width:300px; display:block; border-radius:10px; }
  svg.big { width:150px; height:150px; }
  svg.s64 { width:64px; height:64px; }
  svg.s28 { width:28px; height:28px; }
</style>
</head>
<body>
<h1>Reference (proposal) vs vectorization — iterate</h1>
<div class="row">
  <div class="panel">
    <h2>PROPOSAL (raster reference)</h2>
    <img class="ref" src="proposal-ref.png" alt="proposal" />
  </div>

  <div class="panel">
    <h2>VECTOR — on dark</h2>
    <div class="stack">
      <svg class="big" viewBox="0 0 32 32" id="markdark"></svg>
      <svg class="s64" viewBox="0 0 32 32" id="m64"></svg>
      <svg class="s28" viewBox="0 0 32 32" id="m28"></svg>
    </div>
  </div>

  <div class="panel">
    <h2>VECTOR — on light</h2>
    <div class="lightbox"><svg class="big" viewBox="0 0 32 32" id="marklight"></svg></div>
  </div>
</div>

<template id="markdef">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gA" x1="8" y1="2" x2="14" y2="26" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#6FE0FF"/><stop offset="1" stop-color="#3FA0FF"/>
      </linearGradient>
      <linearGradient id="gB" x1="20" y1="6" x2="22" y2="30" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#4FB6FF"/><stop offset="1" stop-color="#2D7DF0"/>
      </linearGradient>
    </defs>
    <!-- upper-left facet -->
    <path fill="url(#gA)" d="M16 2 L21.5 5.1 L12 13 L16.5 15.2 L6.2 22.8 L4 23 L4 9 Z"/>
    <!-- lower-right facet -->
    <path fill="url(#gB)" d="M24.5 7 L15 15 L19.5 17.2 L9.5 24.8 L16 30 L28 23 L28 9 Z"/>
  </svg>
</template>

<script>
  const def = document.getElementById('markdef').content;
  for (const id of ['markdark','m64','m28','marklight']) {
    const host = document.getElementById(id);
    host.innerHTML = def.querySelector('svg').innerHTML;
  }
</script>
</body>
</html>
