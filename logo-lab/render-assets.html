<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Pyrion — asset renderer (icons + og card)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#222; font-family:Inter,sans-serif; display:grid; gap:24px; padding:24px; justify-items:start; }

  /* ── icon tiles (the favicon.svg design at exact pixel sizes) ── */
  .tile { background:#0A0E1A; display:grid; place-items:center; }
  .tile svg { width:80%; height:80%; }
  #icon-512 { width:512px; height:512px; border-radius:112px; }
  #icon-192 { width:192px; height:192px; border-radius:42px; }
  #icon-180 { width:180px; height:180px; border-radius:0; }  /* apple-touch: square, iOS rounds it */
  #icon-32  { width:32px;  height:32px;  border-radius:7px; }
  #icon-16  { width:16px;  height:16px;  border-radius:3px; }

  /* ── og card 1200×630 ── */
  #og-card {
    width:1200px; height:630px; position:relative; overflow:hidden;
    background:#050810; color:#E6EDF7;
    display:flex; flex-direction:column; justify-content:center;
    padding:0 96px;
  }
  #og-card .glow {
    position:absolute; width:900px; height:900px; right:-260px; top:-300px;
    background:radial-gradient(circle, rgba(79,139,255,0.22), transparent 62%);
  }
  #og-card svg.gridlines { position:absolute; inset:0; width:100%; height:100%; opacity:0.5; }
  #og-card .brand { display:flex; align-items:center; gap:22px; margin-bottom:42px; }
  #og-card .brand svg { width:72px; height:72px; }
  #og-card .brand span { font:700 2.4rem 'Space Grotesk'; letter-spacing:0.22em; }
  #og-card h1 {
    font:700 4.3rem/1.08 'Space Grotesk'; letter-spacing:-0.02em; max-width:13em;
    position:relative;
  }
  #og-card h1 .grad {
    background:linear-gradient(95deg,#4F8BFF,#5BD4FF);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #og-card .tag {
    margin-top:34px; font:500 1.5rem Inter; color:#A0AABF; position:relative;
  }
  #og-card .domain {
    position:absolute; bottom:44px; left:96px;
    font:500 1.15rem 'JetBrains Mono'; color:#5BD4FF; letter-spacing:0.12em;
  }
  #og-card .chips { position:absolute; right:96px; bottom:44px; display:flex; gap:14px; }
  #og-card .chip {
    border:1px solid #1E2A44; background:rgba(15,21,36,0.8); border-radius:999px;
    padding:10px 22px; font:500 1.05rem 'JetBrains Mono'; color:#A0AABF; letter-spacing:0.06em;
  }
  #og-card .chip-fee { border-color:#4F8BFF; color:#5BD4FF; background:rgba(79,139,255,0.12); }
</style>
</head>
<body>

<!-- the mark, reused inline at each size -->
<template id="mark-t">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <path fill="#5BD4FF" stroke="#5BD4FF" stroke-width="1.6" stroke-linejoin="round" fill-rule="evenodd"
      d="M16 2.2 27.9 9.1 v13.8 L16 29.8 4.1 22.9 V9.1 Z
         M19.3 6.8 9.6 17.9 h5 L12.7 25.2 22.4 14.1 h-5 Z"/>
  </svg>
</template>

<div class="tile" id="icon-512"></div>
<div class="tile" id="icon-192"></div>
<div class="tile" id="icon-180"></div>
<div class="tile" id="icon-32"></div>
<div class="tile" id="icon-16"></div>

<div id="og-card">
  <svg class="gridlines" viewBox="0 0 1200 630" preserveAspectRatio="none">
    <g stroke="#1E2A44" stroke-width="1">
      <path d="M0 480 L300 430 L640 470 L980 410 L1200 440" fill="none"/>
      <path d="M0 540 L260 560 L600 520 L940 555 L1200 525" fill="none"/>
      <path d="M820 0 L860 140 L1020 220 L1100 380"/>
      <path d="M950 60 L1020 220" />
    </g>
    <g fill="#4F8BFF" opacity="0.9">
      <circle cx="860" cy="140" r="3.5"/><circle cx="1020" cy="220" r="4.5"/>
      <circle cx="1100" cy="380" r="3"/><circle cx="950" cy="60" r="2.5"/>
    </g>
  </svg>
  <div class="glow"></div>
  <div class="brand">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="ogg" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5BD4FF"/><stop offset="1" stop-color="#4F8BFF"/></linearGradient></defs>
      <path fill="url(#ogg)" stroke="url(#ogg)" stroke-width="1.6" stroke-linejoin="round" fill-rule="evenodd"
        d="M16 2.2 27.9 9.1 v13.8 L16 29.8 4.1 22.9 V9.1 Z M19.3 6.8 9.6 17.9 h5 L12.7 25.2 22.4 14.1 h-5 Z"/>
    </svg>
    <span>PYRION</span>
  </div>
  <h1>La energía de su empresa,<br /><span class="grad">optimizada</span> con lógica de portfolio.</h1>
  <p class="tag">Optimizamos sus contratos del MEM y reinvertimos el ahorro en eficiencia energética y energía solar.</p>
  <div class="domain">www.pyrion.com.ar</div>
  <div class="chips">
    <div class="chip">Contratos · Eficiencia · Solar</div>
    <div class="chip chip-fee">Si no ahorra, no paga</div>
  </div>
</div>

<script>
  // stamp the mark into each icon tile
  const t = document.getElementById('mark-t');
  for (const id of ['icon-512','icon-192','icon-180','icon-32','icon-16']) {
    document.getElementById(id).appendChild(t.content.cloneNode(true));
  }
</script>
</body>
</html>
